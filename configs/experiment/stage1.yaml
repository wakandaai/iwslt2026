# Stage 1: CTC encoder pretraining on ASR data.
# Scheduler keys are flat under `training:` to match stage 2/3/4/5 configs.

encoder:
  input_dim: 80
  encoder_dim: 768
  num_heads: 12
  ffn_dim: 3072
  num_layers: 18
  depthwise_conv_kernel_size: 31
  dropout: 0.1

data:
  train_index: /ocean/projects/cis250145p/shared/datasets/ASR_INDEX_V2.csv
  val_index:   /ocean/projects/cis250145p/shared/datasets/ASR_INDEX_V2.csv
  train_split: train
  val_split:   dev
  languages:
    - afrikaans
    - amharic
    - arabic
    - bemba
    - english
    - french
    - hausa
    - igbo
    - kinyarwanda
    - lingala
    - luganda
    - malagasy
    - portuguese
    - shona
    - somali
    - sotho
    - swahili
    - tigrinya
    - tswana
    - wolof
    - xhosa
    - yoruba
    - zulu
  max_duration: 30.0
  min_duration: 0.1
  lowercase: true
  # Vocab written here so future stages can reference it via vocab_path.
  vocab_path: checkpoints/conformer_encoder/vocab.json

training:
  output_dir: runs/stage1_23_lang
  total_steps: 162035 # 5 epochs on 23 languages with 32407 steps/epoch

  lr: 1e-4
  min_lr: 1e-6
  weight_decay: 0.01

  # Flat scheduler keys — consistent with stage 2/3/4/5 configs.
  scheduler: cosine_warmup_restarts
  warmup_steps: 2000
  first_cycle_steps: 32407
  gamma: 1.0

  max_batch_duration: 240.0   # seconds of audio per batch (binding constraint)
  max_batch_size: 96          # hard cap on instances; rarely binding vs. duration
  val_batch_size: 32          
  num_workers: 4

  log_every_steps: 50
  save_every_steps: 2000
  eval_every_steps: 4000

wandb:
  enabled: true
  project: speech_aura
  name: pretrain-ctc-conformer-large