# Stage 3: Projector + LoRA fine-tuning
# Freeze encoder + LLM base, train projector + LoRA adapters.

encoder:
  input_dim: 80
  encoder_dim: 1024
  num_heads: 16
  ffn_dim: 4096
  num_layers: 18
  depthwise_conv_kernel_size: 31
  dropout: 0.1
  checkpoint: runs/stage1_20_lang/encoder_final.pt
  vocab_size: 828

aura:
  checkpoint: /ocean/projects/cis250145p/shared/checkpoints/Aura-1B/model.pt
  tokenizer:  /ocean/projects/cis250145p/shared/checkpoints/Aura-1B/tokenizer.json
  size: 1b

projector:
  type: transformer
  num_layers: 2
  num_heads: 8
  dropout: 0.1

ctc_compress:
  enabled: true
  strategy: avg
  remove_blanks: false
  blank_id: 0

data:
  train_index: /ocean/projects/cis250145p/shared/datasets/ASR_INDEX_V3.csv
  val_index:   /ocean/projects/cis250145p/shared/datasets/ASR_INDEX_V3.csv
  train_split: train
  val_split:   dev
  languages:
    - amharic
    - arabic
    - bemba
    - english
    - french
    - hausa
    - igbo
    - kinyarwanda
    - lingala
    - luganda
    - malagasy
    - portuguese
    - shona
    - somali
    - sotho
    - swahili
    - tigrinya
    - tswana
    - xhosa
    - yoruba
    - zulu
  max_duration: 30.0
  lowercase: true
  vocab_path: /ocean/projects/cis250145p/shared/checkpoints/conformer_encoder/vocab.json

training:
  task: transcribe
  output_dir: runs/stage3_23_lang
  val_samples_per_lang: 100

  unfreeze_encoder: false
  unfreeze_llm: false
  lora_rank: 16
  lora_alpha: 32
  lora_targets: [q_proj, v_proj]

  ctc_weight: 0.0

  max_steps: 36202
  lr: 1.0e-4
  min_lr: 1.0e-6
  warmup_steps: 2000
  first_cycle_steps: 36202
  gamma: 0.8
  scheduler: cosine_warmup_restarts
  weight_decay: 0.01
  grad_accum: 1

  max_batch_duration: 240.0
  max_batch_size: 96
  max_target_tokens: 256
  num_workers: 4

  log_every: 50
  save_every: 2000
  eval_every: 4000

  no_wandb: false
  wandb_project: speech_aura
  wandb_run_name: stage3-lora